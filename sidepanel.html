<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindMesh</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>🧠 MindMesh</h1>
      <nav>
        <button class="tab active" data-tab="reading">📖 阅读</button>
        <button class="tab" data-tab="bookmarks">⭐ 收藏</button>
        <button class="tab" data-tab="graph">🕸️ 图谱</button>
        <button class="tab" data-tab="settings">⚙️ 设置</button>
      </nav>
    </header>

    <!-- Reading Panel -->
    <section id="panel-reading" class="panel active">
      <div class="toolbar">
        <button id="digest-btn" class="btn">📋 生成今日文摘</button>
        <button id="last-digest-btn" class="btn">📄 最近文摘</button>
        <button id="refresh-reading-btn" class="btn">🔄 刷新</button>
      </div>
      <div id="digest-result" class="result"></div>
      <div id="reading-list" class="history-list"></div>
    </section>

    <!-- Bookmarks Panel -->
    <section id="panel-bookmarks" class="panel">
      <div class="toolbar">
        <button id="save-page-btn" class="btn primary">⭐ 收藏当前页面</button>
        <button id="export-bookmarks-btn" class="btn">📤 导出</button>
        <button id="refresh-bookmarks-btn" class="btn">🔄 刷新</button>
      </div>
      <div id="category-filters" class="category-filters">
        <button class="cat-pill active" data-cat="">全部</button>
        <button class="cat-pill" data-cat="后端技术">后端</button>
        <button class="cat-pill" data-cat="前端/Web">前端</button>
        <button class="cat-pill" data-cat="移动开发">移动</button>
        <button class="cat-pill" data-cat="设计/UI">设计</button>
        <button class="cat-pill" data-cat="AI/ML">AI</button>
        <button class="cat-pill" data-cat="DevOps/工具">DevOps</button>
        <button class="cat-pill" data-cat="产品/灵感">灵感</button>
        <button class="cat-pill" data-cat="学习/教程">教程</button>
        <button class="cat-pill" data-cat="其他">其他</button>
      </div>
      <div class="setting-group">
        <input type="text" id="bookmark-search" placeholder="搜索收藏（标题、标签、URL、内容）..." style="margin-bottom:12px;">
      </div>
      <div id="bookmark-stats" class="hint" style="margin-bottom:12px;"></div>
      <div id="bookmark-list" class="history-list"></div>
    </section>

    <!-- Knowledge Graph Panel -->
    <section id="panel-graph" class="panel">
      <div class="toolbar">
        <button id="extract-all-btn" class="btn primary">🧠 批量提取概念</button>
        <button id="refresh-graph-btn" class="btn">🔄 刷新</button>
      </div>
      <div class="setting-group">
        <input type="text" id="graph-search" placeholder="搜索概念..." style="margin-bottom:12px;">
      </div>
      <div id="graph-stats" class="hint" style="margin-bottom:12px;"></div>
      <div id="graph-list" class="history-list"></div>
    </section>

    <!-- Settings Panel -->
    <section id="panel-settings" class="panel">
      <div class="setting-group">
        <label>API Key</label>
        <input type="password" id="setting-apikey" placeholder="sk-...">
        <span class="hint">支持 OpenAI 兼容 API</span>
      </div>
      <div class="setting-group">
        <label>API URL</label>
        <input type="text" id="setting-apiurl" placeholder="https://api.openai.com/v1">
        <span class="hint">默认 OpenAI，可改 DeepSeek/硅基流动等</span>
      </div>
      <div class="setting-group">
        <label>模型</label>
        <input type="text" id="setting-model" placeholder="gpt-4o-mini">
      </div>
      <button id="save-settings-btn" class="btn primary">保存设置</button>
      <button id="test-api-btn" class="btn">🔗 测试连接</button>
      <hr>
      <div class="setting-group">
        <label>☁️ 云同步</label>
        <div id="sync-status" class="sync-status">
          <span id="sync-status-text">未连接</span>
          <span id="sync-last-time" class="hint"></span>
        </div>
        <div class="sync-buttons">
          <button id="sync-connect-btn" class="btn primary">连接 Google Drive</button>
          <button id="sync-disconnect-btn" class="btn danger" style="display:none;">断开连接</button>
          <button id="sync-now-btn" class="btn" style="display:none;">立即同步</button>
        </div>
      </div>
      <hr>
      <button id="clear-data-btn" class="btn danger">清除所有数据</button>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="lib/storage.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
